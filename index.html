        .wrapper { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; align-items: flex-start; }
        .user-column { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 350px; }

        .name-wrapper { position: relative; display: inline-block; margin-bottom: 5px; overflow: hidden; }
        .name-gif-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background-image: url('red.gif'); background-size: cover;
            filter: blur(1px) drop-shadow(0 0 5px rgba(255, 0, 0, 0.8)); 
        }
        .admin-glow-text {

            text-shadow: 0 0 5px rgba(0,0,0,0.5); 
        }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        td, th { padding: 10px 15px; border-bottom: 1px solid #282828; text-align: left; }
        th { color: #888; font-weight: normal; }
        

        .social-link { color: #5bc0de; text-decoration: none; transition: 0.2s; }
        .social-link:hover { color: #fff; text-decoration: underline; }
        
        .comment-item { padding: 10px 15px; border-bottom: 1px solid #282828; font-size: 13px; }
        .comment-user { color: #5bc0de; font-weight: bold; }

        @media (max-width: 850px) { .wrapper { flex-direction: column; } }

<script>
    
    document.addEventListener('contextmenu', event => event.preventDefault());

   
    document.addEventListener('keydown', (e) => {

        if (e.key === 'F12') {
            e.preventDefault();
        }
       
        if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) {
            e.preventDefault();
        }
   
        if (e.ctrlKey && e.key.toUpperCase() === 'U') {
            e.preventDefault();
        }
  
        if (e.ctrlKey && e.key.toUpperCase() === 'S') {
            e.preventDefault();
        }
    });

  
    document.addEventListener('selectstart', e => e.preventDefault());
</script>
